services:
  - type: web
    name: actiguard-llm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_RECEIVER
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1
